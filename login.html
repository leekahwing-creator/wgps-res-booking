<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ICT Resource Booking Portal</title>
  <style>
    :root {
      --primary: #0f766e;
      --primary-dark: #115e59;
      --primary-light: #ccfbf1;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4ee;
      --danger: #dc2626;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ecfeff 0%, #f8fafc 48%, #eef2ff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 32px 18px;
    }

    .portal-nav {
      margin-bottom: 22px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(226, 232, 240, 0.95);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      font-weight: 900;
      color: var(--primary-dark);
      text-align: center;
    }

    .card {
      background: #ffffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(226, 232, 240, 0.95);
      overflow: hidden;
    }

    .card-header {
      padding: 22px 24px;
      background: linear-gradient(135deg, var(--primary), #164e63);
      color: #ffffff;
    }

    .card-header h1 {
      margin: 0 0 6px;
      font-size: 1.8rem;
    }

    .card-header p {
      margin: 0;
      opacity: 0.9;
      line-height: 1.45;
    }

    form {
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 800;
      color: #1e293b;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.14);
    }

    .btn {
      border: 0;
      min-height: 50px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 12px 26px rgba(15, 118, 110, 0.22);
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .message {
      display: none;
      padding: 13px 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: var(--danger);
    }

    .helper.secondary {
      margin-top: -6px;
      font-size: 0.86rem;
    }

    .helper {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
      text-align: center;
    }

    .helper a {
      color: var(--primary-dark);
      font-weight: 900;
      text-decoration: none;
    }

    .password-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .password-toggle {
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--primary-dark);
      font-weight: 800;
      border-radius: 14px;
      padding: 0 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="portal-nav">ICT Resource Booking Portal</div>

    <section class="card">
      <div class="card-header">
        <h1>Sign In</h1>
        <p>Access your ICT resource bookings securely.</p>
      </div>

      <form id="loginForm">
        <div id="message" class="message"></div>

        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>

          <div class="password-wrap">
            <input id="password" type="password" autocomplete="current-password" required />
            <button id="togglePassword" type="button" class="password-toggle">
              Show
            </button>
          </div>
        </div>

        <button class="btn" type="submit">Sign In</button>

        <p class="helper secondary">
          <a href="forgot-password.html">Forgot your password?</a>
        </p>

        <p class="helper">
          First time using the portal?
          <a href="activate-account.html">Activate your account</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    function showError(text) {
      message.className = "message error";
      message.textContent = text;
    }

    document.getElementById("togglePassword").addEventListener("click", () => {
      const passwordInput = document.getElementById("password");
      const toggleButton = document.getElementById("togglePassword");

      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      toggleButton.textContent = isHidden ? "Hide" : "Show";
    });
    
    loginForm.addEventListener("submit", async event => {
      event.preventDefault();

      message.className = "message";
      message.textContent = "";

      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        })
      });

      const result = await response.json();

      if (result.success) {
        window.location.href = result.user && result.user.role === "DE" ? "de-dashboard.html" : "index.html";
      } else {
        showError(result.message || "Unable to sign in.");
      }
    });
  </script>
</body>
</html>
